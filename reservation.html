<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ONE TRE — 予約</title>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@300;400;500;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--pink:#f0a0b8;--pink2:#e8608a;--pink-bg:#fde8f0;--purple:#c0a0e8;}
body{font-family:'M PLUS Rounded 1c',sans-serif;background:#fdf6fb;color:#222;min-height:100vh}
.app{max-width:480px;margin:0 auto;background:#fff;min-height:100vh}
.hd{padding:20px 20px 14px;border-bottom:2px solid var(--pink-bg);background:#fff}
.logo{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:400;color:#222;letter-spacing:.32em}
.logo-sub{font-size:7px;color:#ccc;letter-spacing:.22em;margin-top:3px}
.logo-catch{font-size:11px;color:var(--pink);margin-top:4px}
.body{padding:20px}
.title{font-size:18px;color:#222;font-weight:700;margin-bottom:6px}
.sub{font-size:12px;color:#888;margin-bottom:24px;line-height:1.6}
.card{background:var(--pink-bg);border-radius:16px;padding:20px;margin-bottom:16px}
.card-title{font-size:11px;color:var(--pink2);letter-spacing:.1em;margin-bottom:16px;font-weight:700}
.fg{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.fg label{font-size:10px;color:#888;font-weight:500}
.fg input{font-size:14px;padding:10px 14px;border:1.5px solid rgba(232,96,138,0.2);border-radius:10px;background:#fff;color:#222;font-family:'M PLUS Rounded 1c',sans-serif;width:100%;outline:none}
.time-label{font-size:10px;color:#888;font-weight:500;margin-bottom:10px}
.time-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.time-btn{padding:10px 6px;border:1.5px solid var(--pink);border-radius:10px;background:#fff;color:var(--pink2);font-size:13px;font-weight:500;cursor:pointer;font-family:'M PLUS Rounded 1c',sans-serif;transition:all 0.15s}
.time-btn.selected{background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;border-color:transparent}
.time-btn:disabled{opacity:0.3;cursor:not-allowed;border-color:#ddd;color:#aaa}
.selected-info{display:none;background:#fde8f0;border-radius:10px;padding:12px;margin-bottom:16px;font-size:13px;color:var(--pink2);text-align:center;font-weight:500}
.btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--pink),var(--purple));border:none;border-radius:14px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:'M PLUS Rounded 1c',sans-serif;letter-spacing:.05em;margin-top:4px}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.note{font-size:10px;color:#aaa;text-align:center;margin-top:14px;line-height:1.6}
.warn{font-size:11px;color:#e86060;background:#fff0f0;border-radius:8px;padding:10px 12px;margin-bottom:12px;display:none}
.loading{text-align:center;padding:16px;font-size:12px;color:#aaa;display:none}
.error-msg{font-size:12px;color:#e86060;text-align:center;padding:12px;display:none}
.success{display:none;text-align:center;padding:40px 20px}
.success-icon{font-size:60px;margin-bottom:16px}
.success-msg{font-size:16px;color:#222;font-weight:700;margin-bottom:8px}
.success-sub{font-size:12px;color:#888;line-height:1.6}
.back-btn{display:inline-block;margin-top:20px;padding:10px 24px;background:var(--pink-bg);color:var(--pink2);border-radius:20px;font-size:12px;font-weight:700;text-decoration:none}
</style>
</head>
<body>
<div class="app">
  <div class="hd">
    <div class="logo">ONE TRE</div>
    <div class="logo-sub">PERSONAL TRAINING GYM</div>
    <div class="logo-catch">私は私</div>
  </div>
  <div class="body">
    <div id="form-area">
      <div class="title">セッションを予約する</div>
      <div class="sub">ご希望の日時をお選びください。確認後、トレーナーよりご連絡いたします。</div>
      <div class="card">
        <div class="card-title">予約情報</div>
        <div class="fg">
          <label>お名前</label>
          <input type="text" id="name" placeholder="長尾 儀弘">
        </div>
        <div class="fg">
          <label>メールアドレス（任意）</label>
          <input type="email" id="email" placeholder="example@gmail.com">
        </div>
        <div class="fg">
          <label>希望日</label>
          <input type="date" id="date" onchange="loadSlots()">
        </div>
        <div id="date-warn" class="warn">⚠️ 予約は前日までにお願いします。翌日以降の日付を選択してください。</div>
        <div class="time-label">希望時間帯（50分セッション）</div>
        <div class="loading" id="loading">空き時間を確認中...</div>
        <div class="error-msg" id="error-msg"></div>
        <div class="time-grid" id="time-grid"></div>
        <div class="selected-info" id="selected-info"></div>
        <div class="fg" style="margin-bottom:0">
          <label>ご要望・メモ（任意）</label>
          <input type="text" id="memo" placeholder="体の調子など、何かあればお気軽にどうぞ">
        </div>
        <button class="btn" id="submit-btn" onclick="submitForm()" disabled>予約リクエストを送る</button>
      </div>
      <div class="note">
        予約はリクエスト制です。トレーナーが確認後、LINEにてご連絡いたします。<br>
        キャンセルはセッション前日までにご連絡ください。
      </div>
    </div>
    <div class="success" id="success-area">
      <div class="success-icon">🎉</div>
      <div class="success-msg">予約リクエストを送りました！</div>
      <div class="success-sub">トレーナーが確認後、LINEにてご連絡いたします。<br>しばらくお待ちください。</div>
      <a href="javascript:history.back()" class="back-btn">マイページに戻る</a>
    </div>
  </div>
</div>
<script>
const GAS_URL='https://script.google.com/macros/s/AKfycbxco9rz7qBsnLU7LLEZZvBsyIeHVueQS375IO2DC0L-02TwELumccKxu0LjrpiT1nlN/exec';
let selectedStart=null,selectedEnd=null;

const today=new Date();
const tomorrow=new Date(today);
tomorrow.setDate(tomorrow.getDate()+1);
const minDate=tomorrow.toISOString().slice(0,10);
document.getElementById('date').setAttribute('min',minDate);
document.getElementById('date').value=minDate;

async function loadSlots(){
  const date=document.getElementById('date').value;
  if(!date) return;

  const sel=new Date(date+'T00:00:00');
  const tod=new Date();tod.setHours(0,0,0,0);
  const warn=document.getElementById('date-warn');
  if(sel<=tod){warn.style.display='block';return;}
  warn.style.display='none';

  const grid=document.getElementById('time-grid');
  const loading=document.getElementById('loading');
  const errMsg=document.getElementById('error-msg');
  grid.innerHTML='';
  selectedStart=null;selectedEnd=null;
  document.getElementById('selected-info').style.display='none';
  document.getElementById('submit-btn').disabled=true;
  loading.style.display='block';
  errMsg.style.display='none';

  try{
    const res=await fetch(GAS_URL+'?action=getSlots&date='+date+'&t='+Date.now(),{method:'GET',mode:'cors'});
    const data=await res.json();
    loading.style.display='none';

    if(data.error){
      errMsg.textContent=data.error;
      errMsg.style.display='block';
      return;
    }

    if(!data.slots||data.slots.length===0){
      errMsg.textContent='この日は空き枠がありません。別の日をお選びください。';
      errMsg.style.display='block';
      return;
    }

    data.slots.forEach(slot=>{
      const btn=document.createElement('button');
      btn.className='time-btn';
      btn.textContent=slot.label;
      btn.onclick=()=>{
        document.querySelectorAll('.time-btn').forEach(b=>b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedStart=slot.start;
        selectedEnd=slot.end;
        const startLabel=slot.label;
        const endDate=new Date(slot.end);
        const endLabel=String(endDate.getHours()).padStart(2,'0')+':'+String(endDate.getMinutes()).padStart(2,'0');
        const info=document.getElementById('selected-info');
        info.style.display='block';
        info.textContent='予約時間：'+startLabel+' 〜 '+endLabel+'（50分）';
        document.getElementById('submit-btn').disabled=false;
      };
      grid.appendChild(btn);
    });
  }catch(err){
    loading.style.display='none';
    errMsg.textContent='空き時間の取得に失敗しました。再度お試しください。';
    errMsg.style.display='block';
  }
}

async function submitForm(){
  const name=document.getElementById('name').value.trim();
  const email=document.getElementById('email').value.trim();
  const date=document.getElementById('date').value;

  if(!name||!date||!selectedStart){alert('お名前・希望日・希望時間帯を入力してください');return;}

  const btn=document.getElementById('submit-btn');
  btn.disabled=true;
  btn.textContent='送信中...';

  try{
    const params=new URLSearchParams({
      action:'submitReservation',
      name,email,phone:'',
      start:selectedStart,end:selectedEnd
    });
    const res=await fetch(GAS_URL+'?'+params.toString(),{method:'GET',mode:'cors'});
    const data=await res.json();

    if(data.success){
      document.getElementById('form-area').style.display='none';
      document.getElementById('success-area').style.display='block';
    }else{
      alert(data.message||'予約に失敗しました。再度お試しください。');
      btn.disabled=false;
      btn.textContent='予約リクエストを送る';
    }
  }catch(err){
    alert('送信に失敗しました。再度お試しください。');
    btn.disabled=false;
    btn.textContent='予約リクエストを送る';
  }
}

loadSlots();
</script>
</body>
</html>
