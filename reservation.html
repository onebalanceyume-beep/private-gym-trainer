<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ONE TRE — 予約</title>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@300;400;500;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#fafaf8;
  --card-bg:#f5f3ef;
  --card-border:#e8e4dc;
  --accent:#8a7f6f;
  --accent2:#5a5046;
  --text:#2a2826;
  --text-sub:#8a7f6f;
  --white:#ffffff;
  --btn-gradient:linear-gradient(135deg,#5a5046,#2a2826);
}
body{font-family:'Noto Serif JP','M PLUS Rounded 1c',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{max-width:480px;margin:0 auto;background:#fff;min-height:100vh}
.hd{padding:20px 20px 14px;border-bottom:1px solid var(--card-border);background:#fff}
.logo{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:400;color:var(--text);letter-spacing:.32em}
.logo-sub{font-size:7px;color:#bbb;letter-spacing:.22em;margin-top:3px}
.body{padding:20px}
.title{font-size:18px;color:var(--text);font-weight:700;margin-bottom:24px;font-family:'Noto Serif JP',serif}
.card{background:var(--card-bg);border-radius:16px;padding:20px;margin-bottom:16px}
.card-title{font-size:11px;color:var(--accent);letter-spacing:.1em;margin-bottom:16px;font-weight:700}
.fg{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.fg label{font-size:10px;color:var(--text-sub);font-weight:500}
.fg input{font-size:14px;padding:10px 14px;border:1px solid var(--card-border);border-radius:10px;background:#fff;color:var(--text);font-family:inherit;width:100%;outline:none;-webkit-appearance:none;appearance:none;box-sizing:border-box;max-width:100%}
.fg input[type=date]{min-height:44px;display:block;width:100%;max-width:100%}
.trainer-label{font-size:10px;color:var(--text-sub);font-weight:500;margin-bottom:10px}
.trainer-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:4px}
.trainer-btn{padding:12px 6px;border:1.5px solid var(--accent);border-radius:10px;background:#fff;color:var(--text);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.15s}
.trainer-btn:hover{background:#faf9f5}
.trainer-btn.selected{background:var(--btn-gradient);color:#fff;border-color:transparent}
.trainer-note{font-size:10px;color:#aaa;margin-top:8px}
.time-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.time-btn{padding:10px 6px;border:1.5px solid var(--accent);border-radius:10px;background:#fff;color:var(--text);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all 0.15s}
.time-btn:hover{background:#faf9f5}
.time-btn.selected{background:var(--btn-gradient);color:#fff;border-color:transparent}
.selected-info{display:none;background:#fff;border-radius:10px;padding:12px;margin-bottom:16px;font-size:13px;color:var(--accent2);text-align:center;font-weight:500;border:1px solid var(--card-border)}
.btn{width:100%;padding:14px;background:var(--btn-gradient);border:none;border-radius:14px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:.05em;margin-top:4px}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.note{font-size:11px;color:#888;text-align:center;margin-top:14px;line-height:1.6}
.line-btn{display:inline-flex;align-items:center;gap:6px;margin-top:12px;padding:10px 20px;background:#06C755;color:#fff;border-radius:22px;text-decoration:none;font-size:12px;font-weight:700;letter-spacing:.05em;transition:opacity 0.2s}
.line-btn:hover{opacity:0.85}
.line-btn-icon{font-size:14px}
.loading{text-align:center;padding:16px;font-size:12px;color:#aaa;display:none}
.error-msg{font-size:12px;color:#c94a4a;text-align:center;padding:12px;display:none}
.success{display:none;text-align:center;padding:40px 20px}
.success-icon{font-size:60px;margin-bottom:16px}
.success-msg{font-size:16px;color:var(--text);font-weight:700;margin-bottom:8px}
.success-sub{font-size:12px;color:#888;line-height:1.6}
.back-btn{display:inline-block;margin-top:20px;padding:10px 24px;background:var(--card-bg);color:var(--accent2);border-radius:20px;font-size:12px;font-weight:700;text-decoration:none}
</style>
</head>
<body>
<div class="app">
  <div class="hd">
    <div class="logo">ONE TRE</div>
    <div class="logo-sub">PERSONAL TRAINING GYM</div>
  </div>
  <div class="body">
    <div id="form-area">
      <div class="title">ご希望の日にちをお選びください</div>
      <div class="card">
        <div class="card-title">予約情報</div>
        <div class="fg">
          <label>お名前</label>
          <input type="text" id="name" placeholder="長尾 儀弘">
        </div>
        <div class="fg" style="margin-bottom:16px">
          <label>希望日</label>
          <input type="date" id="date" onchange="loadSlots()">
        </div>
        <div class="trainer-label">担当トレーナー（任意）</div>
        <div class="trainer-grid">
          <button type="button" class="trainer-btn" onclick="selectTrainer('稲田',this)">稲田</button>
          <button type="button" class="trainer-btn" onclick="selectTrainer('長尾',this)">長尾</button>
        </div>
        <div class="trainer-note">※ 選択しなくても予約できます</div>
      </div>
      <div class="card" id="slot-card" style="display:none">
        <div class="card-title">希望時間帯（50分セッション）</div>
        <div class="loading" id="loading">空き時間を確認中...</div>
        <div class="error-msg" id="error-msg"></div>
        <div class="time-grid" id="time-grid"></div>
        <div class="selected-info" id="selected-info"></div>
        <button class="btn" id="submit-btn" onclick="submitForm()" disabled>予約する</button>
      </div>
      <div class="note">
        キャンセルはセッション前日までにご連絡ください。<br>
        <a href="https://lin.ee/qA9QvFh" class="line-btn" target="_blank" rel="noopener">
          <span class="line-btn-icon">💬</span>公式LINEで問い合わせる
        </a>
      </div>
    </div>
    <div class="success" id="success-area">
      <div class="success-icon">🎉</div>
      <div class="success-msg">予約リクエストを送りました！</div>
      <div class="success-sub">トレーナーが確認後、LINEにてご連絡いたします。<br>しばらくお待ちください。</div>
      <a href="javascript:history.back()" class="back-btn">マイページに戻る</a>
    </div>
  </div>
</div>
<script>
const GAS_URL='https://script.google.com/macros/s/AKfycbzlR1zmKyyLcvWANYpKiO7oPqaaGlx-BOPKhi7redVr1G2MQ0Gj0WRBLLL46jeUxKI/exec';
let selectedStart=null,selectedEnd=null;
let selectedTrainer='';

const today=new Date();
const tomorrow=new Date(today);
tomorrow.setDate(tomorrow.getDate()+1);
document.getElementById('date').setAttribute('min',tomorrow.toISOString().slice(0,10));
document.getElementById('date').value=tomorrow.toISOString().slice(0,10);

function selectTrainer(name,btn){
  if(selectedTrainer===name){
    selectedTrainer='';
    btn.classList.remove('selected');
  }else{
    selectedTrainer=name;
    document.querySelectorAll('.trainer-btn').forEach(b=>b.classList.remove('selected'));
    btn.classList.add('selected');
  }
}

async function loadSlots(){
  const date=document.getElementById('date').value;
  if(!date)return;
  const sel=new Date(date+'T00:00:00');
  const tod=new Date();tod.setHours(0,0,0,0);
  if(sel<=tod)return;

  const slotCard=document.getElementById('slot-card');
  const grid=document.getElementById('time-grid');
  const loading=document.getElementById('loading');
  const errMsg=document.getElementById('error-msg');
  slotCard.style.display='block';
  grid.innerHTML='';
  selectedStart=null;selectedEnd=null;
  document.getElementById('selected-info').style.display='none';
  document.getElementById('submit-btn').disabled=true;
  loading.style.display='block';
  errMsg.style.display='none';

  try{
    const res=await fetch(GAS_URL+'?action=getSlots&date='+date+'&t='+Date.now(),{method:'GET',mode:'cors'});
    const data=await res.json();
    loading.style.display='none';
    if(data.error){errMsg.textContent=data.error;errMsg.style.display='block';return;}
    if(!data.slots||data.slots.length===0){errMsg.textContent='この日は空き枠がありません。別の日をお選びください。';errMsg.style.display='block';return;}
    data.slots.forEach(slot=>{
      const btn=document.createElement('button');
      btn.className='time-btn';
      btn.type='button';
      btn.textContent=slot.label;
      btn.onclick=()=>{
        document.querySelectorAll('.time-btn').forEach(b=>b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedStart=slot.start;selectedEnd=slot.end;
        const endDate=new Date(slot.end);
        const endLabel=String(endDate.getHours()).padStart(2,'0')+':'+String(endDate.getMinutes()).padStart(2,'0');
        const info=document.getElementById('selected-info');
        info.style.display='block';
        info.textContent='予約時間：'+slot.label+' 〜 '+endLabel+'（50分）';
        document.getElementById('submit-btn').disabled=false;
      };
      grid.appendChild(btn);
    });
  }catch(err){
    loading.style.display='none';
    errMsg.textContent='空き時間の取得に失敗しました。再度お試しください。';
    errMsg.style.display='block';
  }
}

async function submitForm(){
  const name=document.getElementById('name').value.trim();
  const date=document.getElementById('date').value;
  if(!name||!date||!selectedStart){alert('お名前と希望日・時間を入力してください');return;}
  const btn=document.getElementById('submit-btn');
  btn.disabled=true;btn.textContent='送信中...';
  try{
    const params=new URLSearchParams({action:'submitReservation',name,email:'',phone:'',start:selectedStart,end:selectedEnd,trainer:selectedTrainer});
    const res=await fetch(GAS_URL+'?'+params.toString(),{method:'GET',mode:'cors'});
    const data=await res.json();
    if(data.success){
      document.getElementById('form-area').style.display='none';
      document.getElementById('success-area').style.display='block';
    }else{
      alert(data.message||'予約に失敗しました。再度お試しください。');
      btn.disabled=false;btn.textContent='予約する';
    }
  }catch(err){
    alert('送信に失敗しました。再度お試しください。');
    btn.disabled=false;btn.textContent='予約する';
  }
}
</script>
</body>
</html>
