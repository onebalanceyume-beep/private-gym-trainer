<!-- ============================================
     ワントレ スタッフ専用クーポン機能（既存GAS対応版）
     既存handleSignupのstaffDiscount方式に合わせたパラメータ名
     ============================================ -->

<!-- 【ステップ1】既存のロゴ部分を以下に差し替え -->
<div class="logo-head">
  <img id="logoImg" src="https://onebalanceyume-beep.github.io/private-gym-trainer/onetre_logo.png" alt="ONE-TRE">
  <div class="sub">PERSONAL TRAINING GYM</div>
</div>

<!-- 【ステップ2】<body>の最後（</body>の直前）に以下を追加 -->

<!-- スタッフ専用クーポンモーダル -->
<div id="couponModal" class="coupon-modal-overlay">
  <div class="coupon-modal">
    <div class="coupon-header">
      <div class="coupon-title">STAFF ONLY</div>
      <div class="coupon-subtitle">特別割引の適用</div>
      <button class="coupon-close" onclick="closeCouponModal()">×</button>
    </div>

    <div class="coupon-body">
      <div class="coupon-warn">⚠ この画面はスタッフ専用です</div>
      <div class="coupon-note">モニター20%OFF・継続10%OFFはメール判定で自動適用されます。<br>この画面は<strong>それ以外の特別割引</strong>を上乗せする用です。</div>

      <!-- %OFF -->
      <label class="coupon-item">
        <input type="radio" name="couponType" value="percent" id="couponPercent">
        <div class="coupon-item-text">
          <div class="coupon-item-title">％OFF 割引</div>
          <div class="coupon-item-desc">
            <input type="number" id="couponPercentValue" placeholder="％" min="1" max="100" class="coupon-amount"
                   onclick="document.getElementById('couponPercent').checked=true">
            <span>％OFF</span>
          </div>
        </div>
        <div class="coupon-badge-tag tag-pink">％</div>
      </label>

      <!-- カスタム金額 -->
      <label class="coupon-item">
        <input type="radio" name="couponType" value="yen" id="couponYen">
        <div class="coupon-item-text">
          <div class="coupon-item-title">金額で割引</div>
          <div class="coupon-item-desc">
            ¥<input type="number" id="couponYenValue" placeholder="0" min="0" class="coupon-amount"
                    onclick="document.getElementById('couponYen').checked=true">
            <span>を引く</span>
          </div>
        </div>
        <div class="coupon-badge-tag tag-gold">¥</div>
      </label>

      <!-- 適用理由 -->
      <div class="coupon-reason-wrap">
        <div class="coupon-reason-label">適用理由（必須）</div>
        <input type="text" id="couponReason" placeholder="例：紹介、スタッフ判断、特別案件 など" class="coupon-reason">
      </div>

      <!-- スタッフ名 -->
      <div class="coupon-reason-wrap">
        <div class="coupon-reason-label">適用スタッフ名（必須）</div>
        <input type="text" id="couponStaff" placeholder="例：ヨシ" class="coupon-reason">
      </div>

      <button class="coupon-apply-btn" onclick="applyCoupon()">この割引を適用する</button>
    </div>
  </div>
</div>

<!-- 適用中バッジ -->
<div id="couponBadge" class="coupon-badge" style="display:none;">
  <span class="coupon-badge-label">適用中</span>
  <span id="couponBadgeText">割引適用中</span>
  <button onclick="clearCoupon()" class="coupon-badge-clear">×</button>
</div>

<style>
#logoImg{user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;cursor:pointer;}

.coupon-modal-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);
  z-index:9999;align-items:center;justify-content:center;padding:20px;
  animation:fadeIn .2s ease;
}
.coupon-modal-overlay.active{display:flex;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.coupon-modal{
  background:#fff;border-radius:20px;width:100%;max-width:440px;
  max-height:90vh;overflow-y:auto;
  box-shadow:0 20px 60px rgba(0,0,0,0.3);
  animation:slideUp .3s ease;
}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}

.coupon-header{
  background:linear-gradient(135deg,#1a1a1a,#2d2d2d);color:#fff;
  padding:20px 24px;position:relative;border-radius:20px 20px 0 0;
}
.coupon-title{font-size:11px;letter-spacing:0.4em;color:#ffcc66;font-weight:bold;}
.coupon-subtitle{font-size:18px;margin-top:6px;letter-spacing:0.1em;}
.coupon-close{
  position:absolute;top:16px;right:16px;background:transparent;border:0;
  color:#fff;font-size:28px;line-height:1;cursor:pointer;padding:4px 10px;
}

.coupon-body{padding:20px 24px 24px;}
.coupon-warn{
  background:#fff4e5;color:#a64c00;padding:10px 14px;border-radius:10px;
  font-size:12px;margin-bottom:10px;text-align:center;
}
.coupon-note{
  background:#f0f8ff;color:#335577;padding:10px 14px;border-radius:10px;
  font-size:11px;line-height:1.6;margin-bottom:16px;
}

.coupon-item{
  display:flex;align-items:center;gap:12px;padding:14px;
  border:1px solid #eee;border-radius:12px;margin-bottom:10px;
  cursor:pointer;transition:all .2s;position:relative;
}
.coupon-item:has(input:checked){border-color:#e8608a;background:#fff5f8;}
.coupon-item input[type="radio"]{width:20px;height:20px;accent-color:#e8608a;flex-shrink:0;}
.coupon-item-text{flex:1;}
.coupon-item-title{font-weight:600;font-size:15px;margin-bottom:4px;}
.coupon-item-desc{font-size:13px;color:#666;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}

.coupon-amount{
  width:90px;padding:4px 8px;border:1px solid #ddd;border-radius:6px;
  font-size:14px;text-align:right;
}

.coupon-badge-tag{
  font-size:11px;font-weight:bold;padding:4px 10px;border-radius:20px;
  letter-spacing:0.05em;flex-shrink:0;
}
.tag-pink{background:#ffe0ec;color:#c13366;}
.tag-gold{background:#fff4cc;color:#996600;}

.coupon-reason-wrap{margin-top:16px;}
.coupon-reason-label{font-size:12px;color:#666;margin-bottom:6px;font-weight:600;}
.coupon-reason{
  width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;
  font-size:14px;box-sizing:border-box;
}

.coupon-apply-btn{
  width:100%;margin-top:20px;padding:14px;background:#e8608a;color:#fff;
  border:0;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;
  letter-spacing:0.1em;
}
.coupon-apply-btn:active{transform:scale(0.98);}

.coupon-badge{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:#333;color:#fff;padding:10px 14px 10px 18px;border-radius:50px;
  font-size:13px;z-index:100;display:flex;align-items:center;gap:10px;
  box-shadow:0 4px 20px rgba(0,0,0,0.2);
}
.coupon-badge-label{background:#ffcc66;color:#333;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:bold;}
.coupon-badge-clear{background:transparent;border:0;color:#fff;font-size:18px;cursor:pointer;padding:0 4px;}
</style>

<script>
/* ============================================
   スタッフ専用クーポン機能（既存GAS対応版）
   - ロゴ3秒長押しで起動
   - 既存handleSignupのstaffDiscountType/Value/Memoに渡す
   ============================================ */

(function(){
  const logo = document.getElementById('logoImg');
  let pressTimer = null;
  let pressStarted = false;

  function startPress(e){
    pressStarted = true;
    pressTimer = setTimeout(()=>{
      if(pressStarted){
        document.getElementById('couponModal').classList.add('active');
        if(navigator.vibrate) navigator.vibrate(50);
      }
    },3000);
  }
  function endPress(){
    pressStarted = false;
    if(pressTimer){ clearTimeout(pressTimer); pressTimer=null; }
  }

  logo.addEventListener('touchstart',startPress,{passive:true});
  logo.addEventListener('touchend',endPress);
  logo.addEventListener('touchcancel',endPress);
  logo.addEventListener('touchmove',endPress);
  logo.addEventListener('mousedown',startPress);
  logo.addEventListener('mouseup',endPress);
  logo.addEventListener('mouseleave',endPress);
  logo.addEventListener('contextmenu',e=>e.preventDefault());
})();

function closeCouponModal(){
  document.getElementById('couponModal').classList.remove('active');
}

// グローバル変数：申込送信時にこの値を読む
window.appliedCoupon = null;

function applyCoupon(){
  const selected = document.querySelector('input[name="couponType"]:checked');
  const pctValue = parseFloat(document.getElementById('couponPercentValue').value)||0;
  const yenValue = parseInt(document.getElementById('couponYenValue').value)||0;
  const reason = document.getElementById('couponReason').value.trim();
  const staff  = document.getElementById('couponStaff').value.trim();

  if(!selected){ alert('割引タイプを選択してください');return; }
  if(selected.value === 'percent' && !pctValue){ alert('割引％を入力してください');return; }
  if(selected.value === 'yen' && !yenValue){ alert('割引金額を入力してください');return; }
  if(!reason){ alert('適用理由を入力してください');return; }
  if(!staff){ alert('適用スタッフ名を入力してください');return; }

  const type = selected.value; // 'percent' or 'yen'
  const value = (type === 'percent') ? pctValue : yenValue;
  const label = (type === 'percent')
    ? `特別${pctValue}%OFF`
    : `特別¥${yenValue.toLocaleString()}引き`;

  // 既存GASのhandleSignupが受け取るパラメータ名に完全一致させる
  window.appliedCoupon = {
    staffDiscountType:  type,         // 'percent' or 'yen'
    staffDiscountValue: value,        // 数値
    staffDiscountMemo:  `${reason}（${staff}）`, // 既存は1カラムなので理由＋スタッフ名を結合
    label: label
  };

  document.getElementById('couponBadgeText').textContent = label;
  document.getElementById('couponBadge').style.display = 'flex';

  closeCouponModal();
  alert('特別割引を適用しました。このまま申込を進めてください。');
}

function clearCoupon(){
  if(!confirm('特別割引を解除しますか？')) return;
  window.appliedCoupon = null;
  document.getElementById('couponBadge').style.display = 'none';
  document.querySelectorAll('input[name="couponType"]').forEach(r=>r.checked=false);
  document.getElementById('couponPercentValue').value = '';
  document.getElementById('couponYenValue').value = '';
  document.getElementById('couponReason').value = '';
  document.getElementById('couponStaff').value = '';
}
</script>

<!-- 【ステップ3】既存の送信処理に以下を1行追加 -->
<script>
/*
  既存signup.htmlの申込送信処理（fetch前のformData組み立て部分）に以下を追加：

  if(window.appliedCoupon){
    formData.append('staffDiscountType',  window.appliedCoupon.staffDiscountType);
    formData.append('staffDiscountValue', window.appliedCoupon.staffDiscountValue);
    formData.append('staffDiscountMemo',  window.appliedCoupon.staffDiscountMemo);
  }

  ★既存GASの handleSignup() 関数がこの3つのパラメータを受け取って、
   スプシの「特別割引」「特別割引額」「特別割引理由」列に自動記録します。
   GAS側は一切変更不要です。
*/
</script>
